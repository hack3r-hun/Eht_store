services:
  mysql:
    image: mysql:8.4
    container_name: ek-yarn-co-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-ek_yarn_co}"
      MYSQL_USER: "${DB_USERNAME:-ek_yarn_co}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - ek_yarn_co_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  ek_yarn_co_mysql:
